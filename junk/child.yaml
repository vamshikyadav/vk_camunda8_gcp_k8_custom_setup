name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service_name:
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Service: ${{ inputs.service_name }}"

      - name: Use Secret
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | wc -c
---
on:
  workflow_call:
    outputs:
      image_tag:
        description: "Docker image tag"
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - id: tag
        run: echo "tag=v1.2.3" >> $GITHUB_OUTPUT          